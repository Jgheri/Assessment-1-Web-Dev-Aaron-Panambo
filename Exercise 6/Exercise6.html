<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css6.css">
<title>Exercise6</title>
</head>

<body>
    <div class="container">
        <h1>Petrol Calculator</h1>
        <div class="input-row">
            <div class="input-group">
                <label for="price">Cost per Liter (£):</label>
                <input type="number" id="price" value="1.72" step="0.01">
            </div>
            <div class="input-group">
                <label for="liters">Liters Purchased:</label>
                <input type="number" id="liters" value="0">
            </div>
        </div>

        <button onclick="calculateTotal()">Calculate</button>
        <p id="Cost">Total Cost: £0.00</p>
    </div>

    <script>
        function calculateTotal() {
            let price  = parseFloat(document.getElementById("price").value);
            let liters = parseFloat(document.getElementById("liters").value);
            let total  = price * liters;

            document.getElementById("Cost").textContent =
                "Total Cost: £" + total.toFixed(2);
        }
    </script>
</body>
</html>
